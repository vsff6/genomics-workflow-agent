name: genomics-agent
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.11
  - pip

  # Core scientific
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3

  # Single-cell (scverse)
  - pip:
    - scanpy>=1.9
    - anndata>=0.10
    - scvi-tools>=1.0  

  # Bioinformatics
  - pysam>=0.22
  - biopython>=1.81
  - pyarrow>=14.0
  - h5py>=3.9

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12

  # Genomic intervals (pick one based on your environment)
  # - pyranges>=0.0.129
  # - pybedtools>=0.9  # requires bedtools in PATH

  # Utilities
  - pyyaml>=6.0
  - jsonschema>=4.20
  - rich>=13.0

  # Testing
  - pytest>=7.4
  - pytest-cov>=4.1

# NOTE: R workflows are NOT included here.
# For Seurat, Signac, or R-based analysis, create a separate env:
#   conda env create -f env/environment-r.yml
#
# Optional external CLI tools (not conda packages, install separately):
#   samtools   - BAM/CRAM inspection and manipulation
#   bedtools   - BED file operations
#   bcftools   - VCF manipulation and stats
#   fastqc     - Read quality control
#   multiqc    - Aggregate QC reports
#   fastp      - Read trimming and QC
#   macs3      - Peak calling for ATAC-seq and ChIP-seq
#   deeptools  - BAM coverage, TSS enrichment, heatmaps
#   nextflow   - Pipeline orchestration (for nf-core)
#   docker     - Container runtime (for nf-core profiles)
#   singularity - HPC container runtime (for nf-core on clusters)
#   tabix      - VCF/BED indexing
#   mosdepth   - Fast coverage calculation
